<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0A0A2E"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Aurora gradients -->
  <ellipse cx="300" cy="200" rx="400" ry="200" fill="url(#aurora1)"/>
  <ellipse cx="900" cy="150" rx="350" ry="180" fill="url(#aurora2)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="420" y1="0" x2="420" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="660" y1="0" x2="660" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="780" y1="0" x2="780" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/><line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1020" y1="0" x2="1020" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/><line x1="1140" y1="0" x2="1140" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Glow orb -->
  <circle cx="600" cy="200" r="150" fill="#6366F1" opacity="0.08" filter="blur(60px)"/>

  <!-- Trust badge -->
  <rect x="450" y="60" width="300" height="32" rx="16" fill="#6366F1" fill-opacity="0.15" stroke="#6366F1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="81" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#818CF8" text-anchor="middle" letter-spacing="0.5">✦ TRUSTED BY 50,000+ STUDENTS</text>

  <!-- Main title -->
  <text x="600" y="150" font-family="Outfit, system-ui, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">Calculate.</text>
  <text x="600" y="210" font-family="Outfit, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="-2">Track. Achieve.</text>

  <!-- Subtitle -->
  <text x="600" y="250" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white" fill-opacity="0.5" text-anchor="middle">The most advanced CGPA calculator for Indian universities</text>

  <!-- Stats -->
  <g transform="translate(150, 290)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" fill="#818CF8" text-anchor="middle">50K+</text>
    <text x="0" y="18" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">STUDENTS</text>
  </g>
  <g transform="translate(383, 290)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" fill="#818CF8" text-anchor="middle">11</text>
    <text x="0" y="18" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">UNIVERSITIES</text>
  </g>
  <g transform="translate(617, 290)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" fill="#818CF8" text-anchor="middle">100%</text>
    <text x="0" y="18" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">OFFLINE</text>
  </g>
  <g transform="translate(850, 290)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="24" font-weight="700" fill="#818CF8" text-anchor="middle">4.9</text>
    <text x="0" y="18" font-family="Inter, system-ui, sans-serif" font-size="10" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="1">RATING</text>
  </g>

  <!-- Feature cards -->
  <g transform="translate(0, 340)">
    <!-- Card 1 -->
    <rect x="50" y="0" width="160" height="45" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="62" y="10" width="28" height="28" rx="6" fill="#6366F1" fill-opacity="0.15"/>
    <text x="76" y="29" font-family="Font Awesome 6 Free" font-size="12" fill="#818CF8" text-anchor="middle">∑</text>
    <text x="102" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">SGPA Calculator</text>
    <text x="102" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="white" fill-opacity="0.4">Semester-wise</text>
  </g>
  <g transform="translate(0, 340)">
    <rect x="230" y="0" width="160" height="45" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="242" y="10" width="28" height="28" rx="6" fill="#6366F1" fill-opacity="0.15"/>
    <text x="256" y="29" font-family="Font Awesome 6 Free" font-size="12" fill="#818CF8" text-anchor="middle">📈</text>
    <text x="282" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">CGPA Tracker</text>
    <text x="282" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="white" fill-opacity="0.4">Cumulative</text>
  </g>
  <g transform="translate(0, 340)">
    <rect x="410" y="0" width="160" height="45" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="422" y="10" width="28" height="28" rx="6" fill="#6366F1" fill-opacity="0.15"/>
    <text x="436" y="29" font-family="Font Awesome 6 Free" font-size="12" fill="#818CF8" text-anchor="middle">⇄</text>
    <text x="462" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">GPA ↔ %</text>
    <text x="462" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="white" fill-opacity="0.4">Instant convert</text>
  </g>
  <g transform="translate(0, 340)">
    <rect x="590" y="0" width="160" height="45" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="602" y="10" width="28" height="28" rx="6" fill="#6366F1" fill-opacity="0.15"/>
    <text x="616" y="29" font-family="Font Awesome 6 Free" font-size="12" fill="#818CF8" text-anchor="middle">🎯</text>
    <text x="642" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">Goal Predictor</text>
    <text x="642" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="white" fill-opacity="0.4">Plan ahead</text>
  </g>
  <g transform="translate(0, 340)">
    <rect x="770" y="0" width="160" height="45" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="782" y="10" width="28" height="28" rx="6" fill="#6366F1" fill-opacity="0.15"/>
    <text x="796" y="29" font-family="Font Awesome 6 Free" font-size="12" fill="#818CF8" text-anchor="middle">📄</text>
    <text x="822" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">PDF Export</text>
    <text x="822" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="white" fill-opacity="0.4">Print ready</text>
  </g>
  <g transform="translate(0, 340)">
    <rect x="950" y="0" width="160" height="45" rx="8" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="962" y="10" width="28" height="28" rx="6" fill="#6366F1" fill-opacity="0.15"/>
    <text x="976" y="29" font-family="Font Awesome 6 Free" font-size="12" fill="#818CF8" text-anchor="middle">📷</text>
    <text x="1002" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="white">OCR Scan</text>
    <text x="1002" y="34" font-family="Inter, system-ui, sans-serif" font-size="9" fill="white" fill-opacity="0.4">Auto-fill</text>
  </g>
</svg>
